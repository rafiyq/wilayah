name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Restore cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Restore pre-built database cache
        uses: actions/cache@v5
        with:
          path: data/locations.db
          key: ${{ runner.os }}-db-${{ hashFiles('src/builder/mod.rs', 'src/db.rs', 'Cargo.toml') }}

      - name: Check formatting
        run: cargo fmt --check --all
      - name: Run clippy
        run: cargo clippy --features raw-sqlite -- -D warnings
      - name: Run tests
        run: cargo test --features raw-sqlite
      - name: Run build-db tests
        run: cargo test --features build-db
      - name: Check build-db example
        run: cargo check --example build_db --features build-db
